<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chicago Pickleball Finder</title>
  <meta name="description" content="Find every pickleball court in the greater Chicago area. Search by location, filter by type, and get directions." />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            pickle: { 50: '#f0fdf4', 100: '#dcfce7', 200: '#bbf7d0', 400: '#4ade80', 500: '#22c55e', 600: '#16a34a', 700: '#15803d', 800: '#166534', 900: '#14532d' },
          }
        }
      }
    }
  </script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    #map { z-index: 0; }
    .leaflet-popup-content-wrapper { border-radius: 12px; padding: 0; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,.12); }
    .leaflet-popup-content { margin: 0; min-width: 220px; }
    .court-card { transition: all .15s ease; }
    .court-card:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,0,0,.08); }
    .filter-chip { transition: all .1s ease; }
    .filter-chip.active { background: #166534; color: white; }
    @keyframes pulse-dot { 0%,100% { opacity: 1; } 50% { opacity: .4; } }
    .loading-dot { animation: pulse-dot 1.2s ease-in-out infinite; }
  </style>
</head>

<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col">
  <!-- Header -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-30">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center gap-3">
      <div class="flex items-center gap-2">
        <div class="w-9 h-9 rounded-xl bg-pickle-600 flex items-center justify-center">
          <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 12a4 4 0 0 1 8 0"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/></svg>
        </div>
        <div>
          <h1 class="text-lg font-bold leading-tight text-pickle-800">Chicago Pickleball</h1>
          <p class="text-[11px] text-gray-500 leading-none hidden sm:block">Every court in the greater Chicago area</p>
        </div>
      </div>
      <div class="flex-1"></div>
      <div id="stats-badge" class="hidden sm:flex items-center gap-1.5 text-xs font-medium text-pickle-700 bg-pickle-50 px-3 py-1.5 rounded-full"></div>
    </div>
  </header>

  <!-- Search + Filters -->
  <div class="bg-white border-b border-gray-100 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 py-3 space-y-3">
      <!-- Search bar row -->
      <div class="flex gap-2">
        <div class="relative flex-1">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.3-4.3"/></svg>
          <input id="search-input" type="text" placeholder="Search courts, parks, addresses..."
            class="w-full pl-10 pr-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-pickle-500 focus:border-transparent bg-gray-50 hover:bg-white transition" />
        </div>
        <button id="locate-btn" title="Find courts near me"
          class="px-3 py-2.5 border border-gray-200 rounded-xl hover:bg-pickle-50 hover:border-pickle-300 transition flex items-center gap-1.5 text-sm text-gray-600">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 2v4m0 12v4m10-10h-4M6 12H2"/><circle cx="12" cy="12" r="4"/></svg>
          <span class="hidden sm:inline">Near me</span>
        </button>
      </div>

      <!-- Filter chips -->
      <div class="flex gap-2 overflow-x-auto hide-scrollbar pb-1">
        <button class="filter-chip px-3 py-1.5 rounded-full border text-xs font-medium whitespace-nowrap border-gray-200 text-gray-600 hover:border-pickle-300" data-filter="access" data-value="public">Free / Public</button>
        <button class="filter-chip px-3 py-1.5 rounded-full border text-xs font-medium whitespace-nowrap border-gray-200 text-gray-600 hover:border-pickle-300" data-filter="access" data-value="fee">Fee-based</button>
        <button class="filter-chip px-3 py-1.5 rounded-full border text-xs font-medium whitespace-nowrap border-gray-200 text-gray-600 hover:border-pickle-300" data-filter="access" data-value="members">Members Only</button>
        <div class="w-px bg-gray-200 mx-1 self-stretch"></div>
        <button class="filter-chip px-3 py-1.5 rounded-full border text-xs font-medium whitespace-nowrap border-gray-200 text-gray-600 hover:border-pickle-300" data-filter="indoor" data-value="true">Indoor</button>
        <button class="filter-chip px-3 py-1.5 rounded-full border text-xs font-medium whitespace-nowrap border-gray-200 text-gray-600 hover:border-pickle-300" data-filter="outdoor" data-value="true">Outdoor</button>
        <div class="w-px bg-gray-200 mx-1 self-stretch"></div>
        <button class="filter-chip px-3 py-1.5 rounded-full border text-xs font-medium whitespace-nowrap border-gray-200 text-gray-600 hover:border-pickle-300" data-filter="sort" data-value="courts">Most Courts</button>
      </div>
    </div>
  </div>

  <!-- Main content: list + map -->
  <div class="flex-1 flex flex-col lg:flex-row overflow-hidden" style="height: calc(100vh - 170px);">
    <!-- Court list -->
    <div id="court-list-panel" class="lg:w-[420px] xl:w-[460px] overflow-y-auto hide-scrollbar border-r border-gray-100 bg-white">
      <div id="results-header" class="sticky top-0 bg-white/90 backdrop-blur-sm px-4 py-2 border-b border-gray-100 flex items-center justify-between z-10">
        <span id="results-count" class="text-xs font-medium text-gray-500"></span>
        <button id="toggle-map-btn" class="lg:hidden text-xs font-medium text-pickle-600 flex items-center gap-1">
          <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l5.447 2.724A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/></svg>
          Show Map
        </button>
      </div>
      <div id="court-list" class="p-3 space-y-2"></div>
      <div id="loading-indicator" class="hidden p-8 text-center">
        <div class="flex justify-center gap-1.5 mb-2">
          <div class="w-2 h-2 rounded-full bg-pickle-500 loading-dot"></div>
          <div class="w-2 h-2 rounded-full bg-pickle-500 loading-dot" style="animation-delay:.2s"></div>
          <div class="w-2 h-2 rounded-full bg-pickle-500 loading-dot" style="animation-delay:.4s"></div>
        </div>
        <p class="text-sm text-gray-500">Loading courts...</p>
      </div>
      <div id="empty-state" class="hidden p-8 text-center">
        <p class="text-gray-400 text-sm">No courts match your search</p>
      </div>
    </div>

    <!-- Map -->
    <div id="map-panel" class="flex-1 hidden lg:block relative">
      <div id="map" class="absolute inset-0"></div>
    </div>
  </div>

  <!-- Court detail modal -->
  <div id="detail-modal" class="hidden fixed inset-0 z-50 flex items-end sm:items-center justify-center">
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" id="modal-backdrop"></div>
    <div class="relative bg-white w-full sm:max-w-lg sm:rounded-2xl rounded-t-2xl max-h-[85vh] overflow-y-auto shadow-2xl">
      <div class="sticky top-0 bg-white/90 backdrop-blur-sm border-b border-gray-100 px-5 py-3 flex items-center justify-between">
        <h2 id="detail-name" class="text-lg font-bold truncate"></h2>
        <button id="modal-close" class="p-1.5 hover:bg-gray-100 rounded-lg transition">
          <svg class="w-5 h-5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div id="detail-body" class="p-5 space-y-4"></div>
    </div>
  </div>

  <!-- Mobile map toggle overlay -->
  <div id="mobile-map-overlay" class="hidden fixed inset-0 z-40 lg:hidden flex flex-col">
    <div class="bg-white border-b border-gray-200 px-4 py-2 flex items-center justify-between">
      <span class="text-sm font-medium text-gray-700">Map View</span>
      <button id="close-mobile-map" class="text-sm font-medium text-pickle-600">Show List</button>
    </div>
    <div id="mobile-map" class="flex-1"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
