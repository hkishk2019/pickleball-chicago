services:
  - type: web
    name: pickleball-chicago
    runtime: python
    buildCommand: pip install -r requirements.txt && python scripts/seed.py
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENABLE_SCHEDULER
        value: "true"
      - key: PYTHON_VERSION
        value: "3.12"
